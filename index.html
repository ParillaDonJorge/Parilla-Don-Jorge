<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Parrilla Don Jorge</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background-color: #111;
    color: white;
}

header {
    background: url('https://images.unsplash.com/photo-1555992336-03a23c6b3a9d');
    background-size: cover;
    padding: 80px;
    text-align: center;
}

header h1 {
    font-size: 50px;
}

nav {
    background: #8B0000;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
}

section {
    padding: 40px;
}

h2 {
    color: #ff4d4d;
}

.menu-item {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid gray;
    padding: 5px 0;
}
</style>
</head>

<body>

<header>
    <h1>Parrilla Don Jorge</h1>
    <p>Villarroel 1201 - Villa Crespo</p>
</header>

<section>
<h2>Nuestras carnes</h2>

<div class="menu-item">
  <span>Asado</span>
  <span><span id="asado_grande"></span> / <span id="asado_chico"></span></span>
</div>

<div class="menu-item">
  <span>Vacío</span>
  <span><span id="vacio_grande"></span> / <span id="vacio_chico"></span></span>
</div>

<div class="menu-item">
  <span>Entraña</span>
  <span><span id="entrana_grande"></span> / <span id="entrana_chico"></span></span>
</div>

<div class="menu-item">
  <span>Bife de chorizo</span>
  <span><span id="bife_grande"></span> / <span id="bife_chico"></span></span>
</div>

<div class="menu-item">
  <span>Pechuga de pollo</span>
  <span id="pollo"></span>
</div>

</section>

<script>
fetch('precios.json')
  .then(r => r.json())
  .then(data => {
    for (let key in data) {
      let el = document.getElementById(key);
      if (el) el.innerText = "$" + data[key];
    }
  });
</script>

</body>
</html>
